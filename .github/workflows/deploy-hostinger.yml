name: Deploy - Hostinger via master

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hostinger-master-deploy
  cancel-in-progress: true

jobs:
  build-and-publish-master:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Validate Hostinger output
        run: |
          set -euo pipefail
          test -d dist/assets
          test -f dist/index.html
          test -f dist/.htaccess
          test -f dist/llms.txt
          echo "Build validado: assets, index.html, .htaccess e llms.txt encontrados."

      - name: Publish dist to master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          rm -rf /tmp/hostinger-dist
          mkdir -p /tmp/hostinger-dist
          cp -a dist/. /tmp/hostinger-dist/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --orphan hostinger-master
          git rm -rf . >/dev/null 2>&1 || true
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +

          cp -a /tmp/hostinger-dist/. .

          # A branch master fica como a pasta public_html da Hostinger:
          # assets/, .htaccess, index.html e llms.txt.
          test -d assets
          test -f index.html
          test -f .htaccess
          test -f llms.txt

          git add -A

          if git diff --cached --quiet; then
            echo "Nenhuma alteração no build para publicar."
            exit 0
          fi

          git commit -m "Deploy build to Hostinger"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:master
